<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Météo</title>
  <meta name="description" content="Application météo minimaliste" />
  <meta name="theme-color" content="#f5f2eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Météo" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2eb;
      --ink: #1a1814;
      --dim: #8a8070;
      --line: #d8d2c4;
      --red: #c44b2b;
      --mono: 'IBM Plex Mono', 'Consolas', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* ── LAYOUT ── */
    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 28px;
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
    }

    /* ── HEADER ── */
    header {
      padding-top: 56px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    #location-display {
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    #location-display:hover { color: var(--ink); }
    #location-display svg { flex-shrink: 0; }

    #city-name {
      margin-top: 10px;
      font-size: clamp(28px, 9vw, 42px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    /* ── MAIN TEMP ── */
    .main-block {
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--line);
    }

    .temp-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 6px;
    }

    #temp-value {
      font-size: clamp(72px, 22vw, 96px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }

    .temp-unit {
      font-size: 22px;
      font-weight: 300;
      margin-top: 8px;
      color: var(--dim);
    }

    #weather-desc {
      margin-top: 14px;
      font-size: 13px;
      font-style: italic;
      font-weight: 300;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    /* ── DETAILS ── */
    .details-block {
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 16px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
    }

    .detail-label {
      font-size: 9px;
      font-family: var(--mono);
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .detail-value {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: -0.02em;
    }

    /* ── FORECAST ── */
    .forecast-block {
      padding: 24px 0;
      flex: 1;
    }

    .forecast-label {
      font-size: 9px;
      font-family: var(--mono);
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 16px;
    }

    .forecast-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .forecast-day {
      display: grid;
      grid-template-columns: 56px 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      font-weight: 300;
    }
    .forecast-day:last-child { border-bottom: none; }

    .fc-day-name {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      text-align: left;
    }

    .fc-desc {
      font-style: italic;
      color: var(--dim);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
    }

    .fc-low { color: var(--dim); font-size: 12px; }
    .fc-high { font-size: 15px; font-weight: 400; }

    /* ── FOOTER ── */
    footer {
      padding: 20px 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #update-time {
      font-size: 9px;
      font-family: var(--mono);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--dim);
    }

    #refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dim);
      padding: 4px;
      transition: color 0.2s, transform 0.4s;
    }
    #refresh-btn:hover { color: var(--ink); }
    #refresh-btn.spinning svg { animation: spin 0.8s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SEARCH OVERLAY ── */
    #search-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      padding: 56px 28px 28px;
      flex-direction: column;
      gap: 16px;
      max-width: 420px;
      margin: 0 auto;
    }
    #search-overlay.open { display: flex; }

    .search-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .search-title {
      font-size: 9px;
      font-family: var(--mono);
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
    }

    #search-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dim);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    #search-close:hover { color: var(--ink); }

    #search-input {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--ink);
      padding: 8px 0;
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 300;
      color: var(--ink);
      outline: none;
      letter-spacing: -0.01em;
    }
    #search-input::placeholder { color: var(--line); }

    #search-results {
      display: flex;
      flex-direction: column;
      margin-top: 8px;
    }

    .search-result-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: opacity 0.15s;
    }
    .search-result-item:hover { opacity: 0.6; }
    .search-result-item:last-child { border-bottom: none; }

    .sri-name { font-size: 16px; font-weight: 300; }
    .sri-sub { font-size: 9px; font-family: var(--mono); font-weight: 300; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; }

    /* ── STATES ── */
    #loading, #error {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-family: var(--mono);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--dim);
    }
    #error { color: var(--red); }
    #loading.active, #error.active { display: flex; }
    #weather-content { display: none; }
    #weather-content.active { display: flex; flex-direction: column; flex: 1; }

    /* ── ANIMATIONS ── */
    .fade-in {
      animation: fadeIn 0.5s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* iOS tap highlight */
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>

<div id="app">
  <div id="loading" class="active">
    <span>localisation…</span>
  </div>
  <div id="error"></div>
  <div id="weather-content">
    <header>
      <div id="location-display" onclick="openSearch()">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <circle cx="5" cy="4" r="2.5" stroke="currentColor" stroke-width="1"/>
          <path d="M5 10C5 10 1 6.5 1 4a4 4 0 018 0c0 2.5-4 6-4 6z" stroke="currentColor" stroke-width="1" fill="none"/>
        </svg>
        <span id="location-label">Paris, FR</span>
      </div>
      <div id="city-name">Paris</div>
    </header>

    <div class="main-block">
      <div class="temp-row">
        <div id="temp-value">—</div>
        <div class="temp-unit">°C</div>
      </div>
      <div id="weather-desc">—</div>
    </div>

    <div class="details-block">
      <div class="detail-item">
        <div class="detail-label">Ressenti</div>
        <div class="detail-value" id="feels-like">—</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Humidité</div>
        <div class="detail-value" id="humidity">—</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Vent</div>
        <div class="detail-value" id="wind">—</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Précip.</div>
        <div class="detail-value" id="precip">—</div>
      </div>
    </div>

    <div class="forecast-block">
      <div class="forecast-label">7 jours</div>
      <div class="forecast-list" id="forecast-list"></div>
    </div>

    <footer>
      <div id="update-time">—</div>
      <button id="refresh-btn" onclick="refreshWeather()" aria-label="Actualiser">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13.5 8A5.5 5.5 0 112.5 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M13.5 4v4h-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </footer>
  </div>
</div>

<!-- Search overlay -->
<div id="search-overlay">
  <div class="search-header">
    <span class="search-title">Changer de ville</span>
    <button id="search-close" onclick="closeSearch()">Fermer</button>
  </div>
  <input
    type="text"
    id="search-input"
    placeholder="Ville…"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    oninput="onSearchInput(this.value)"
  />
  <div id="search-results"></div>
</div>

<script>
// ── WMO CODE → DESCRIPTION ──────────────────────────────────────────
const WMO = {
  0: 'Ciel dégagé', 1: 'Principalement dégagé', 2: 'Partiellement nuageux',
  3: 'Couvert', 45: 'Brouillard', 48: 'Brouillard givrant',
  51: 'Bruine légère', 53: 'Bruine modérée', 55: 'Bruine dense',
  61: 'Pluie légère', 63: 'Pluie modérée', 65: 'Pluie forte',
  71: 'Neige légère', 73: 'Neige modérée', 75: 'Neige forte',
  77: 'Grains de neige', 80: 'Averses légères', 81: 'Averses modérées',
  82: 'Averses violentes', 85: 'Averses de neige', 86: 'Averses de neige fortes',
  95: 'Orage', 96: 'Orage avec grêle', 99: 'Orage violent',
};

const DAYS = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];

let currentLat = 48.8566;
let currentLon = 2.3522;
let currentCity = 'Paris';
let currentCountry = 'FR';
let searchTimeout = null;

// ── INIT ────────────────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('weather-location');
  if (saved) {
    const loc = JSON.parse(saved);
    currentLat = loc.lat;
    currentLon = loc.lon;
    currentCity = loc.city;
    currentCountry = loc.country;
    fetchWeather();
  } else {
    navigator.geolocation
      ? navigator.geolocation.getCurrentPosition(
          pos => {
            currentLat = pos.coords.latitude;
            currentLon = pos.coords.longitude;
            reverseGeocode(currentLat, currentLon).then(fetchWeather);
          },
          () => fetchWeather() // fallback Paris
        )
      : fetchWeather();
  }
}

// ── REVERSE GEOCODE ─────────────────────────────────────────────────
async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=fr`
    );
    const d = await r.json();
    currentCity = d.address.city || d.address.town || d.address.village || 'Inconnu';
    currentCountry = d.address.country_code?.toUpperCase() || '';
  } catch {}
}

// ── FETCH WEATHER ────────────────────────────────────────────────────
async function fetchWeather() {
  showLoading();
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code,precipitation`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum`
      + `&timezone=auto&forecast_days=7`;

    const r = await fetch(url);
    if (!r.ok) throw new Error('API error');
    const data = await r.json();
    renderWeather(data);
  } catch (e) {
    showError('Impossible de charger la météo.');
  }
}

function refreshWeather() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 800);
  fetchWeather();
}

// ── RENDER ───────────────────────────────────────────────────────────
function renderWeather(data) {
  const c = data.current;
  const d = data.daily;

  // Header
  document.getElementById('city-name').textContent = currentCity;
  document.getElementById('location-label').textContent =
    currentCountry ? `${currentCity}, ${currentCountry}` : currentCity;

  // Main
  document.getElementById('temp-value').textContent = Math.round(c.temperature_2m);
  document.getElementById('weather-desc').textContent = WMO[c.weather_code] || '—';

  // Details
  document.getElementById('feels-like').textContent = `${Math.round(c.apparent_temperature)}°`;
  document.getElementById('humidity').textContent = `${c.relative_humidity_2m}%`;
  document.getElementById('wind').textContent = `${Math.round(c.wind_speed_10m)} km/h`;
  document.getElementById('precip').textContent = `${c.precipitation} mm`;

  // Forecast
  const list = document.getElementById('forecast-list');
  list.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const date = new Date(d.time[i]);
    const dayName = i === 0 ? 'Auj.' : DAYS[date.getDay()];
    const desc = WMO[d.weather_code[i]] || '—';
    const hi = Math.round(d.temperature_2m_max[i]);
    const lo = Math.round(d.temperature_2m_min[i]);

    const row = document.createElement('div');
    row.className = 'forecast-day';
    row.innerHTML = `
      <span class="fc-day-name">${dayName}</span>
      <span class="fc-desc">${desc}</span>
      <span class="fc-low">${lo}°</span>
      <span class="fc-high">${hi}°</span>
    `;
    list.appendChild(row);
  }

  // Footer
  const now = new Date();
  document.getElementById('update-time').textContent =
    `màj ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  showContent();

  // Save location
  localStorage.setItem('weather-location', JSON.stringify({
    lat: currentLat, lon: currentLon,
    city: currentCity, country: currentCountry
  }));
}

// ── SEARCH ───────────────────────────────────────────────────────────
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
}

function onSearchInput(value) {
  clearTimeout(searchTimeout);
  if (value.length < 2) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }
  searchTimeout = setTimeout(() => searchCity(value), 350);
}

async function searchCity(query) {
  try {
    const r = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=fr&format=json`
    );
    const data = await r.json();
    renderSearchResults(data.results || []);
  } catch {
    document.getElementById('search-results').innerHTML =
      '<div style="font-size:12px;font-family:var(--mono);color:var(--dim);padding:12px 0">Erreur de recherche</div>';
  }
}

function renderSearchResults(results) {
  const container = document.getElementById('search-results');
  if (!results.length) {
    container.innerHTML =
      '<div style="font-size:12px;font-family:var(--mono);color:var(--dim);padding:12px 0">Aucun résultat</div>';
    return;
  }
  container.innerHTML = results.map((r, i) => `
    <div class="search-result-item" onclick="selectCity(${i})"
         data-lat="${r.latitude}" data-lon="${r.longitude}"
         data-city="${encodeURIComponent(r.name)}"
         data-country="${encodeURIComponent(r.country_code?.toUpperCase() || '')}">
      <span class="sri-name">${r.name}</span>
      <span class="sri-sub">${[r.admin1, r.country].filter(Boolean).join(' — ')}</span>
    </div>
  `).join('');
}

function selectCity(index) {
  const items = document.querySelectorAll('.search-result-item');
  const item = items[index];
  currentLat = parseFloat(item.dataset.lat);
  currentLon = parseFloat(item.dataset.lon);
  currentCity = decodeURIComponent(item.dataset.city);
  currentCountry = decodeURIComponent(item.dataset.country);
  closeSearch();
  fetchWeather();
}

// ── UI STATES ────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('loading').classList.add('active');
  document.getElementById('error').classList.remove('active');
  document.getElementById('weather-content').classList.remove('active');
}

function showError(msg) {
  document.getElementById('loading').classList.remove('active');
  document.getElementById('error').textContent = msg;
  document.getElementById('error').classList.add('active');
  document.getElementById('weather-content').classList.remove('active');
}

function showContent() {
  document.getElementById('loading').classList.remove('active');
  document.getElementById('error').classList.remove('active');
  const wc = document.getElementById('weather-content');
  wc.classList.add('active');
  wc.classList.remove('fade-in');
  void wc.offsetWidth;
  wc.classList.add('fade-in');
}

// ── SERVICE WORKER ────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── START ─────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
